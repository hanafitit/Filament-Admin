services:
  - type: web
    name: hanafitit-filament-admin
    runtime: php
    plan: free
    disk:
      name: app-data
      mountPath: /var/data
      sizeGB: 1
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan config:clear
      php artisan route:clear
      php artisan view:clear
      npm install
      npm run build
    startCommand: sh -c "mkdir -p /var/data storage/logs && touch /var/data/database.sqlite && php artisan migrate --force && if [ -n \"$ADMIN_EMAIL\" ] && [ -n \"$ADMIN_PASSWORD\" ]; then php artisan app:create-admin --name=\"${ADMIN_NAME:-Admin}\" --email=\"$ADMIN_EMAIL\" --password=\"$ADMIN_PASSWORD\" --reset-password --no-interaction; fi && (php artisan queue:work --tries=1 --timeout=0 >> storage/logs/queue.log 2>&1 &) && (php artisan schedule:work >> storage/logs/scheduler.log 2>&1 &) && php artisan serve --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ADMIN_NAME
        value: Admin
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://filament-admin-acee.onrender.com
      - key: APP_DB_MODE
        value: hybrid
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_LOCAL_CONNECTION
        value: sqlite
      - key: DB_REMOTE_CONNECTION
        value: pgsql_remote
      - key: SQLITE_DB_DATABASE
        value: /var/data/database.sqlite
